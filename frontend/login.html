<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Login Screen</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
  </head>
  <body
    style="
      background-color: #e7f1ff;
      height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    "
  >
    <div
      style="width: 100vw; height: 100vh; display: flex; flex-direction: column"
    >
      <div
        style="
          height: 15vh;
          display: flex;
          justify-content: center;
          align-items: end;
        "
      >
        <div
          style="
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 0.03em;
            color: #334d6e;
          "
        >
          NittanyAuction
        </div>
      </div>

      <div
        style="
          flex: 1 1 0;
          display: flex;
          justify-content: center;
          align-items: start;
          padding-top: 3vh;
        "
      >
        <div
          style="
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
            padding: 2.5rem 2.5rem;
            width: 20vw;
            min-width: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
          "
        >
          <form
            method="post"
            action="/login"
            style="width: 100%; max-width: 340px"
          >
            {% if error %}
            <div class="alert alert-danger mb-3" role="alert">{{ error }}</div>
            {% endif %}
            <div class="mb-4">
              <label
                for="email"
                class="form-label"
                style="font-weight: 500; color: #334d6e"
                >Email address</label
              >
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                placeholder="Enter email"
                required
                autofocus
              />
            </div>
            <div class="mb-4">
              <label
                for="password"
                class="form-label"
                style="font-weight: 500; color: #334d6e"
                >Password</label
              >
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                placeholder="Enter password"
                required
              />
            </div>
            <div class="d-grid">
              <button
                type="submit"
                class="btn btn-primary btn-lg"
                style="background-color: #334d6e; border-color: #334d6e"
              >
                Sign in
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <!-- Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
      integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js"
      integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
